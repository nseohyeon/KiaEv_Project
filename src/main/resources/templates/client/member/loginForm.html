<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>KIA EV - 로그인</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: #f8f9fa; /* 배경색을 연한 그레이로 하여 박스 강조 */
        }

        /* 헤더 고정(100px) 대응 및 화면 중앙 정렬 최적화 */
        .login-container {
            width: 1200px; 
            margin: 0 auto; 
            /* 헤더 높이(100px) + 여유 여백(60px) = 160px */
            padding: 160px 0 100px; 
            min-height: calc(100vh - 100px); /* 푸터 제외 화면 높이 확보 */
            display: flex; 
            align-items: flex-start; /* 너무 아래로 처지지 않게 상단 정렬 */
            justify-content: center;
            box-sizing: border-box;
        }

        .login-box {
            width: 450px; 
            padding: 60px;
            border: 1px solid #eee; 
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.07);
            background: #fff;
        }

        .login-title {
            font-size: 32px; 
            font-weight: bold; 
            color: #05141f;
            text-align: center; 
            margin: 0 0 40px 0; 
            letter-spacing: -1.5px;
        }
        
        /* 회원/딜러 선택 영역 */
        .type-selector { 
            display: flex; 
            justify-content: center; 
            gap: 40px; 
            margin-bottom: 35px; 
            padding-bottom: 25px; 
            border-bottom: 1px solid #f4f4f4;
        }

        .type-option { 
            display: flex; 
            align-items: center; 
            cursor: pointer; 
            font-size: 16px; 
            color: #555; 
            font-weight: 500;
        }

        .type-option input { 
            margin-right: 10px; 
            accent-color: #05141f; 
            width: 18px; 
            height: 18px; 
            cursor: pointer;
        }

        .type-option input:checked + span { 
            color: #05141f; 
            font-weight: bold; 
        }

        .form-group { margin-bottom: 20px; }

        .form-input {
            width: 100%; 
            padding: 16px; 
            border: 1px solid #ddd; 
            border-radius: 8px;
            box-sizing: border-box; 
            font-size: 15px; 
            outline: none;
            transition: 0.2s;
        }

        .form-input:focus { 
            border-color: #05141f; 
            box-shadow: 0 0 0 3px rgba(5, 20, 31, 0.05); 
        }
        
        .btn-login {
            width: 100%; 
            padding: 18px; 
            background: #05141f; 
            color: #fff;
            border: none; 
            border-radius: 8px; 
            font-size: 17px; 
            font-weight: bold;
            cursor: pointer; 
            margin-top: 15px; 
            transition: 0.3s;
        }

        .btn-login:hover { 
            background: #1a2a3a; 
            transform: translateY(-2px); 
        }

        .login-footer-links {
            margin-top: 30px; 
            display: flex; 
            justify-content: center; 
            gap: 20px;
            font-size: 14px; 
            color: #888;
        }

        .login-footer-links a { 
            text-decoration: none; 
            color: #888; 
            transition: 0.2s; 
        }

        .login-footer-links a:hover { color: #000; }
        
        .join-prompt {
            margin-top: 40px; 
            padding-top: 25px; 
            border-top: 1px solid #f4f4f4;
            text-align: center; 
            font-size: 14px; 
            color: #999;
        }

        .btn-join { 
            color: #05141f; 
            font-weight: bold; 
            text-decoration: none; 
            margin-left: 10px; 
        }
    </style>
</head>
<body>

    <th:block th:replace="~{common/header :: header}"></th:block>

    <main class="login-container">
        <div class="login-box">
            <h2 class="login-title">LOGIN</h2>
            
            <div class="type-selector">
                <label class="type-option">
                    <input type="radio" name="userType" value="MEMBER" checked onclick="handleTypeChange('MEMBER')">
                    <span>회원</span>
                </label>
                <label class="type-option">
                    <input type="radio" name="userType" value="DEALER" onclick="handleTypeChange('DEALER')">
                    <span>딜러</span>
                </label>
            </div>
            
            <form action="/member/login" method="post">
                <div class="form-group">
                    <input type="text" id="targetId" name="memberId" class="form-input" placeholder="아이디" required>
                </div>
                <div class="form-group">
                    <input type="password" name="memberPw" class="form-input" placeholder="비밀번호" required>
                </div>
                
                <button type="submit" class="btn-login">로그인</button>
            </form>

            <div class="login-footer-links">
                <a href="#">아이디 찾기</a>
                <span style="color:#eee">|</span>
                <a href="#">비밀번호 찾기</a>
            </div>

            <div class="join-prompt">
                아직 회원이 아니신가요? 
                <a th:href="@{/member/join}" class="btn-join">회원가입</a>
            </div>
        </div>
    </main>

    <th:block th:replace="~{common/footer :: footer}"></th:block>

    <script>
        function handleTypeChange(type) {
            const idInput = document.getElementById('targetId');
            if (type === 'MEMBER') {
                idInput.placeholder = '아이디';
                idInput.name = 'memberId';
            } else {
                idInput.placeholder = '사원번호';
                idInput.name = 'dealerId';
            }
            idInput.value = '';
        }
    </script>
</body>
</html>
