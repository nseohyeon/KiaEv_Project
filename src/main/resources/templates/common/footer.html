<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<footer th:fragment="footer">
    <style>
        .footer-wrap { 
            background: #f4f4f4; 
            padding: 60px 0;
            border-top: 1px solid #ddd; 
            margin-top: 50px; 
        }
        .footer-inner { 
            width: 1200px; 
            margin: 0 auto; 
            text-align: center; 
        }
        .f-links { 
            margin-bottom: 25px; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .f-links a { 
            text-decoration: none; 
            color: #333; 
            font-weight: bold;
            font-size: 16px; 
            display: flex;
            align-items: center;
            transition: 0.2s;
        }
        .f-links a:hover {
            color: #000;
        }
        
        .f-links a:not(:last-child)::after {
            content: "";
            display: inline-block;
            width: 1px;        /* 선 두께 */
            height: 14px;      /* 선 높이 */
            background-color: #bbb; /* 선 색상 */
            margin: 0 25px;    /* 좌우 간격 */
            /* 💡 텍스트 높이에 맞춰 수직 중앙 정렬 */
            vertical-align: middle; 
        }

        .f-copy { 
            color: #999; 
            font-size: 14px; 
            letter-spacing: 0.5px;
            margin-top: 15px;
        }
    </style>
    
    <div class="footer-wrap">
        <div class="footer-inner">
            <div class="f-links">
                <a th:href="@{/company}">회사정보</a>
                <a th:href="@{/terms}">이용약관</a>
                <a th:href="@{/privacy}">개인정보처리방침</a>
            </div>
            
            <div class="f-copy">
                © 2026 KIA EV Project Team DAY6. All rights reserved.
            </div>
        </div>
    </div>
</footer>
</html>
